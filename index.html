        <h2 class="upload-page__title mg-reset">Upload picture</h2>
        <form class="upload-page__form" name="uploadForm">
          <label class="field-wrap">
            <span class="label">Name:</span>
            <input class="field neumorf-field" type="text" name="name">
          </label>
          <label class="field-wrap">
            <span class="label">Picture title:</span>
            <input class="field neumorf-field" type="text" name="pictureTitle">
          </label>
          <label class="field-wrap">
            <span class="label">Picture description:</span>
            <textarea class="field neumorf-field" name="description" cols="20" rows="10"></textarea>
          </label>
          <label class="field-wrap">
            <span class="label">Upload picture:</span>
            <input type="file" class="upload-field" accept="image/*" name="uploadImage">
            <span class="upload-field-custom neumorf-field">Choose image
